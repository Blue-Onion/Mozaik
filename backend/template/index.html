<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mozaik | Video Check</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        h1 { margin-bottom: 20px; color: #818cf8; }
        .video-box {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video { width: 100%; height: 100%; }
        .info {
            text-align: left;
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            word-break: break-all;
            margin-bottom: 20px;
        }
        .status { margin-bottom: 15px; font-weight: bold; }
        button {
            background: #6366f1;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        button:hover { background: #4f46e5; }
        .loading-text { color: #94a3b8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>HandleVideoGeneration Check</h1>
        
        <div class="status" id="status">Ready to fetch...</div>

        <div class="video-box">
            <video id="videoPlayer" controls crossorigin="use-credentials" style="display: none;"></video>
            <div id="placeholder" class="loading-text">Video will appear here</div>
        </div>

        <div class="info">
            <strong>Video ID:</strong> 452175fe-cf00-42ae-9592-153fa8b3cb9a<br>
            <strong>Endpoint:</strong> /video/get-video/452175fe-cf00-42ae-9592-153fa8b3cb9a
        </div>

        <button onclick="checkRoute()">Run Check</button>
    </div>

    <script>
        const TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJleHAiOjE3NzgzNTU5ODksImlhdCI6MTc3ODI2OTU4OSwidXNlcklkIjoiYzdjM2Y4NjMtMzAzNi00OTUzLWEyNWItNjBlZjkxYjVkOTJjIn0.Rs7mFpCYok4AfAD0-NUcBUZtIrN_5vL8H75r0u5qshM";
        const VIDEO_ID = "452175fe-cf00-42ae-9592-153fa8b3cb9a";

        function checkRoute() {
            const status = document.getElementById('status');
            const video = document.getElementById('videoPlayer');
            const placeholder = document.getElementById('placeholder');

            status.textContent = "Setting auth cookie...";
            document.cookie = `authToken=${TOKEN}; path=/; SameSite=Lax`;

            status.textContent = "Fetching video (this may take a few seconds for Manim to render)...";
            
            const videoUrl = `/video/get-video/${VIDEO_ID}`;
            
            // We use fetch first to see if it returns 200 OK
            fetch(videoUrl, { credentials: 'include' })
                .then(response => {
                    if (response.ok) {
                        status.textContent = "Success! Playing video...";
                        status.style.color = "#10b981";
                        
                        // Set the video source and show the player
                        video.src = videoUrl + "?t=" + Date.now();
                        video.style.display = "block";
                        placeholder.style.display = "none";
                        video.load();
                        video.play();
                    } else {
                        return response.text().then(text => {
                            // Try to parse as JSON, fallback to raw text
                            try {
                                const err = JSON.parse(text);
                                throw new Error(err.Error || "Failed to fetch video");
                            } catch (e) {
                                if (e.message.includes("Failed to fetch")) throw e;
                                throw new Error(`HTTP ${response.status}: ${text}`);
                            }
                        });
                    }
                })
                .catch(err => {
                    status.textContent = "Error: " + err.message;
                    status.style.color = "#ef4444";
                    console.error(err);
                });
        }
    </script>
</body>
</html>
